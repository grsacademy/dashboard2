<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>롯데GRS 실시간 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --lotte-red: #F00028; --bg-gray: #f8f9fa; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; }
        header { background: white; border-bottom: 4px solid var(--lotte-red); padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        header h1 { color: var(--lotte-red); margin: 0; font-size: 1.4rem; }
        .container { max-width: 1100px; margin: 20px auto; padding: 0 15px; }
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; text-align: center; border-top: 5px solid var(--lotte-red); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .stat-card .value { font-size: 2.2rem; font-weight: bold; color: var(--lotte-red); margin: 5px 0; }
        .chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; margin-bottom: 20px; }
        @media (max-width: 600px) { .chart-grid { grid-template-columns: 1fr; } }
        .chart-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); min-height: 300px; }
        .feedback-section { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f1f1f1; padding: 10px; font-size: 0.9rem; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.85rem; }
        #loader { position: fixed; top:0; left:0; width:100%; height:100%; background:white; display:flex; justify-content:center; align-items:center; z-index:999; }
    </style>
</head>
<body>

<div id="loader">🚀 데이터를 불러오는 중입니다...</div>

<header>
    <h1>LOTTE GRS 실시간 교육 성과 대시보드</h1>
    <div id="lastUpdated" style="font-size: 0.8rem; color: #666;"></div>
</header>

<div class="container">
    <div class="summary-grid">
        <div class="stat-card"><h3>누적 응답수</h3><div class="value" id="totalCount">0</div></div>
        <div class="stat-card"><h3>전체 평균</h3><div class="value" id="avgScore">0.0</div></div>
    </div>

    <div class="chart-grid">
        <div class="chart-card"><canvas id="categoryChart"></canvas></div>
        <div class="chart-card"><canvas id="distributionChart"></canvas></div>
    </div>

    <div class="feedback-section">
        <h3>최근 수강 후기</h3>
        <div style="overflow-x:auto;">
            <table>
                <thead><tr><th>날짜</th><th>강의명</th><th>소감</th></tr></thead>
                <tbody id="feedbackTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ⚠️ 수정하신 '웹에 게시' 주소를 여기에 넣으세요.
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR8H_uS8T_WY6GcpaGlV-DTZuTfuVsF_jo6hRiNyZWju3UmzMIycBW3g3_Vg0rGHfPy9xMQBt6ptXyQ/pub?output=csv';

    let categoryChart, distributionChart;

    // CSV 파싱 함수 (쉼표와 따옴표 문제를 방지하는 더 정교한 방식)
    function parseCSV(text) {
        const rows = [];
        const lines = text.split('\r\n'); // 구글 시트는 보통 \r\n으로 줄바꿈함
        
        for (let line of lines) {
            if (!line) continue;
            // 따옴표 안의 쉼표는 무시하고 자르는 정규식
            const cols = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
            rows.push(cols.map(c => c.replace(/^"|"$/g, '')));
        }
        return rows;
    }

    async function fetchData() {
        try {
            console.log("데이터 가져오는 중...");
            const response = await fetch(CSV_URL);
            const text = await response.text();
            const data = parseCSV(text);
            
            console.log("파싱된 데이터:", data); // 브라우저 F12 콘솔에서 확인 가능

            if (data.length <= 1) {
                console.error("데이터가 비어있습니다.");
                return;
            }

            processDashboard(data.slice(1)); // 헤더 제외
        } catch (error) {
            console.error("Fetch Error:", error);
            document.getElementById('loader').innerText = "데이터 로드 실패. (웹에 게시 설정을 확인하세요)";
        }
    }

    function processDashboard(rows) {
        let totalCount = rows.length;
        let sumOverall = 0;
        let distCounts = [0,0,0,0,0]; // 5,4,3,2,1점
        let catSums = [0,0,0,0,0,0]; // 기간, 과목, 강사, 강의장, 파일럿, 기숙사

        const tableBody = document.getElementById('feedbackTableBody');
        tableBody.innerHTML = '';

        rows.forEach(row => {
            // 컬럼 매핑 (구글 시트의 실제 순서와 맞는지 꼭 확인 필요)
            const overall = parseFloat(row[1]) || 0;
            sumOverall += overall;
            if (overall >= 1 && overall <= 5) distCounts[5 - Math.round(overall)]++;

            for(let i=0; i<6; i++) {
                catSums[i] += parseFloat(row[i+2]) || 0;
            }

            // 테이블 (최신 10건만)
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${row[0].split(' ')[0]}</td><td>${row[8] || '-'}</td><td>${row[9] || '-'}</td>`;
            if (tableBody.children.length < 10) tableBody.appendChild(tr);
        });

        // 값 업데이트
        document.getElementById('totalCount').innerText = totalCount;
        document.getElementById('avgScore').innerText = (sumOverall / totalCount).toFixed(1);
        
        const catAverages = catSums.map(s => (s/totalCount).toFixed(1));
        updateCharts(catAverages, distCounts);

        document.getElementById('lastUpdated').innerText = "마지막 업데이트: " + new Date().toLocaleTimeString();
        document.getElementById('loader').style.display = 'none';
    }

    function initCharts() {
        categoryChart = new Chart(document.getElementById('categoryChart'), {
            type: 'bar',
            data: {
                labels: ['기간', '과목', '강사', '강의장', '파일럿', '기숙사'],
                datasets: [{ label: '항목별 평점', data: [], backgroundColor: '#F00028' }]
            },
            options: { responsive: true, scales: { y: { min: 0, max: 5 } } }
        });

        distributionChart = new Chart(document.getElementById('distributionChart'), {
            type: 'doughnut',
            data: {
                labels: ['5점', '4점', '3점', '2점', '1점'],
                datasets: [{ data: [], backgroundColor: ['#F00028', '#FF4D6A', '#FF8095', '#FFB3BF', '#FFE6E9'] }]
            },
            options: { responsive: true, plugins: { title: { display: true, text: '만족도 분포' } } }
        });
    }

    function updateCharts(catData, distData) {
        categoryChart.data.datasets[0].data = catData;
        categoryChart.update();
        distributionChart.data.datasets[0].data = distData;
        distributionChart.update();
    }

    window.onload = () => {
        initCharts();
        fetchData();
        setInterval(fetchData, 60000); // 1분마다 자동 갱신
    };
</script>

</body>
</html>
